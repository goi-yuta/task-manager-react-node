version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: task-manager-db
    ports:
      - "5432:5432"  # ホストのポート:コンテナのポート
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: task_manager_db
    volumes:
      - postgres_data:/var/lib/postgresql/data # データを永続化（コンテナを消してもデータは残る）

volumes:
  postgres_data:
